<!DOCTYPE html>
<html lang="hu">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.B.C.D. Kocsmatúra</title>

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: url("https://i.imgur.com/8Km9tLL.jpg") center/cover fixed;
    color: white;
    text-align: center;
    backdrop-filter: blur(3px);
}

.overlay {
    background: rgba(0,0,0,0.75);
    min-height: 100vh;
    padding: 40px 20px;
}

h1 {
    font-family: 'Anton', sans-serif;
    letter-spacing: 2px;
    font-size: 4rem;
    text-transform: uppercase;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 1.3rem;
    margin-bottom: 40px;
}

.section {
    margin: 60px auto;
    max-width: 700px;
    background: rgba(20,20,20,0.9);
    padding: 30px;
    border-radius: 15px;
}

button, .btn {
    padding: 15px 25px;
    font-size: 1rem;
    background: yellow;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    text-decoration: none;
    color: black;
}

button:disabled {
    background: #cccccc;
    cursor: not-allowed;
    opacity: 0.6;
}

input[type="text"],
input[type="email"],
input[type="tel"],
input[type="number"] {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
}

input[type="checkbox"] {
    width: auto;
    margin: 0 8px 0 0;
    cursor: pointer;
}

.checkbox-group {
    margin: 15px 0;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.checkbox-group label {
    margin: 0;
    cursor: pointer;
}

.countdown {
    font-size: 2rem;
    margin-top: 20px;
}

.file-link {
    display: block;
    margin: 15px 0;
    color: cyan;
    font-size: 1.2rem;
}
</style>
</head>

<body>
<div class="overlay">

<h1>ABCD Kocsmatúra</h1>

<div class="section">
<h2>⏳ Visszaszámlálás</h2>
<div class="countdown" id="countdown"></div>
</div>

<div class="section">
<h2>Regisztráció</h2>
<form action="https://formspree.io/f/mojnorvy" method="POST">
    <input type="text" name="teamname" placeholder="Csapat neve" required>
    <input type="text" name="captain" placeholder="Csapatkapitány neve *" required>
    <input type="email" name="email" placeholder="Email cím *" required>
    <input type="tel" name="phone" placeholder="Telefonszám *" required>
    <input type="text" name="member2" placeholder="2. csapattag neve *" required>
    <input type="text" name="member3" placeholder="3. csapattag neve" required>
    <input type="text" name="member4" placeholder="4. csapattag neve" required>
    <div class="checkbox-group">
        <input type="checkbox" name="rules" id="rules" required>
        <label for="rules">Elfogadom a szabályzatot *</label>
    </div>
    <button type="submit">Regisztrálok</button>
</form>
</div>

<div class="section">
<h2>📂 Letölthető fájlok</h2>
<a href="files/szabalyzat.pdf" class="file-link" download>Szabályzat letöltése</a>
<a href="files/feladatlap.pdf" class="file-link" download>Feladatlap letöltése</a>
<a href="files/terkep.pdf" class="file-link" download>Térkép letöltése</a>
</div>

</div>

<script>
const eventDate = new Date("April 10, 2026 18:00:00").getTime();

const countdownFunction = setInterval(function() {
    const now = new Date().getTime();
    const distance = eventDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        days + " nap " + hours + " óra " +
        minutes + " perc " + seconds + " mp";

    if (distance < 0) {
        clearInterval(countdownFunction);
        document.getElementById("countdown").innerHTML = "ELINDULT.";
    }
}, 1000);

// Form validation - enable/disable submit button
const form = document.querySelector('form');
const submitBtn = form.querySelector('button[type="submit"]');
const requiredInputs = form.querySelectorAll('[required]');

function checkFormValidity() {
    let isValid = true;
    
    requiredInputs.forEach(input => {
        if (input.type === 'checkbox') {
            if (!input.checked) isValid = false;
        } else {
            if (!input.value.trim()) isValid = false;
        }
    });
    
    submitBtn.disabled = !isValid;
}

// First check on page load
checkFormValidity();

// Listen to changes on all required inputs
requiredInputs.forEach(input => {
    input.addEventListener('input', checkFormValidity);
    input.addEventListener('change', checkFormValidity);
});

</body>
</html>
