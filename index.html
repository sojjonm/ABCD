<!DOCTYPE html>
<html lang="hu">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V. A.B.C.D. Kocsmatúra</title>

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: url("images/Pepe_vizjegy.jpg") center/cover fixed;
    color: rgb(165, 218, 172);
    text-align: center;
    backdrop-filter: blur(3px);
}

.overlay {
    background: rgba(125, 125, 125, 0.5);
    min-height: 100vh;
    padding: 40px 20px;
}

h1 {
    font-family: 'Anton', sans-serif;
    letter-spacing: 2px;
    font-size: 4rem;
    text-transform: uppercase;
    margin-bottom: 10px;
    color: #FFD700;
    -webkit-text-stroke: 2px black;
    text-stroke: 2px black;
    text-shadow: 3px 3px 0px rgba(0,0,0,0.8);
}

.subtitle {
    font-size: 1.3rem;
    margin-bottom: 40px;
}

.section {
    margin: 60px auto;
    max-width: 700px;
    background: rgba(20,20,20,0.9);
    padding: 30px;
    border-radius: 15px;
    transition: all 0.3s ease;
}

.section:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(255,215,0,0.3);
}

button, .btn {
    padding: 15px 25px;
    font-size: 1rem;
    background: yellow;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    text-decoration: none;
    color: black;
    transition: all 0.3s ease;
}

button:hover, .btn:hover {
    transform: scale(1.1);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

button:disabled {
    background: #cccccc;
    cursor: not-allowed;
    opacity: 0.6;
}

button:disabled:hover {
    transform: scale(1);
    box-shadow: none;
}

input[type="text"],
input[type="email"],
input[type="tel"],
input[type="number"],
input[type="password"] {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
    transition: all 0.3s ease;
}

input[type="text"]:focus,
input[type="email"]:focus,
input[type="tel"]:focus,
input[type="number"]:focus,
input[type="password"]:focus {
    outline: none;
    box-shadow: 0 0 15px rgba(255,215,0,0.5);
    transform: scale(1.02);
}

input[type="checkbox"] {
    width: auto;
    margin: 0 8px 0 0;
    cursor: pointer;
}

.checkbox-group {
    margin: 15px 0;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.checkbox-group label {
    margin: 0;
    cursor: pointer;
}

.countdown {
    font-size: 2rem;
    margin-top: 20px;
}

.file-link {
    display: block;
    margin: 15px 0;
    color: cyan;
    font-size: 1.2rem;
    transition: all 0.3s ease;
}

.file-link:hover {
    color: #00ffff;
    text-shadow: 0 0 10px cyan;
    transform: scale(1.05);
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.section {
    animation: fadeInUp 0.6s ease-out forwards;
}

.section:nth-child(1) { animation-delay: 0.1s; }
.section:nth-child(2) { animation-delay: 0.2s; }
.section:nth-child(3) { animation-delay: 0.3s; }
.section:nth-child(4) { animation-delay: 0.4s; }
.section:nth-child(5) { animation-delay: 0.5s; }

.social-links {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 20px;
    flex-wrap: wrap;
}

.social-links a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 60px;
    height: 60px;
    background: #FFD700;
    border-radius: 50%;
    font-size: 1.5rem;
    text-decoration: none;
    color: black;
    transition: all 0.3s ease;
}

.social-links a:hover {
    transform: scale(1.2) rotate(-10deg);
    box-shadow: 0 0 20px rgba(255,215,0,0.8);
}
</style>
</head>

<body>
<div class="overlay">

<h1>ABCD Kocsmatúra</h1>

<div class="section">
<h2>Az V. ABCD kocsmatúra kezdetéig hátra lévő idő:</h2>
<div class="countdown" id="countdown"></div>
</div>

<div class="section">
<h2>Regisztráció</h2>
<form action="https://formspree.io/f/mojnorvy" method="POST">
    <input type="text" name="teamname" placeholder="Csapat neve">
    <input type="text" name="captain" placeholder="Csapatkapitány neve *" required>
    <input type="email" name="email" placeholder="Email cím *" required>
    <input type="tel" name="phone" placeholder="Telefonszám *" required>
    <input type="text" name="member2" placeholder="2. csapattag neve *" required>
    <input type="text" name="member3" placeholder="3. csapattag neve">
    <input type="text" name="member4" placeholder="4. csapattag neve">
    <div class="checkbox-group">
        <input type="checkbox" name="rules" id="rules" required>
        <label for="rules">Elfogadom a szabályzatot *</label>
    </div>
    <button type="submit">Regisztrálok</button>
</form>
</div>

<div class="section">
<h2>📂 Letölthető fájlok</h2>
<!-- mindenki láthatja ezt -->
<a href="files/alapszabalyzat.odt" class="file-link" download>Szabályzat letöltése</a>

<p style="margin-top:30px;">Előfeladat letöltése jelszóval véve:</p>
<input type="password" id="file-password" placeholder="Jelszó">
<button id="unlock-btn" class="btn">Megnyitás</button>

<div id="protected-files" style="display:none; margin-top:20px;">
    <a href="files/e_feladatlap.pdf" class="file-link" download>Előfeladat letöltése</a>
</div>
</div>

<div class="section">
<h2>📝 Tavalyi feladatlap</h2>
<a href="files/tavalyi_feladatlap.pdf" class="file-link" download style="display:inline-block; padding:20px 40px; font-size:1.3rem; background: #FFD700; color: black; border-radius: 10px; font-weight: bold;">Tavalyi feladatlap letöltése</a>
</div>

<div class="section">
<h2>📱 Kövesd minket</h2>
<div class="social-links">
    <a href="https://instagram.com" target="_blank" title="Instagram">📷</a>
</div>
</div>

</div>

<script>
const eventDate = new Date("April 10, 2026 18:00:00").getTime();

const countdownFunction = setInterval(function() {
    const now = new Date().getTime();
    const distance = eventDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        days + " nap " + hours + " óra " +
        minutes + " perc " + seconds + " mp";

    if (distance < 0) {
        clearInterval(countdownFunction);
        document.getElementById("countdown").innerHTML = "ELINDULT.";
    }
}, 1000);

// Form validation - enable/disable submit button
const form = document.querySelector('form');
const submitBtn = form.querySelector('button[type="submit"]');
const requiredInputs = form.querySelectorAll('[required]');

// Password protection for downloads (shop only the előfeladat)
const correctPassword = "0000"; // change as needed
const unlockBtn = document.getElementById('unlock-btn');
const passwordInput = document.getElementById('file-password');
const protectedFiles = document.getElementById('protected-files');

unlockBtn.addEventListener('click', () => {
    if (passwordInput.value === correctPassword) {
        protectedFiles.style.display = 'block';
        passwordInput.value = '';
    } else {
        alert('Helytelen jelszó');
    }
});

function checkFormValidity() {
    let isValid = true;
    
    requiredInputs.forEach(input => {
        if (input.type === 'checkbox') {
            if (!input.checked) isValid = false;
        } else {
            if (!input.value.trim()) isValid = false;
        }
    });
    
    submitBtn.disabled = !isValid;
}

// First check on page load
checkFormValidity();

// Listen to changes on all required inputs
requiredInputs.forEach(input => {
    input.addEventListener('input', checkFormValidity);
    input.addEventListener('change', checkFormValidity);
});
</script>

</body>
</html>
